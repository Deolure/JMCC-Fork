#commands
jmcc.command.help.start.message = &fПомощь по командам:
jmcc.command.help.mid.message = &e {0} &f{1}&8- &f{2}
jmcc.command.help.mid.param.message = &8  -&7{0} &f{1}&8- &f{2}
jmcc.command.help.end.message = &fПростые параметры без дополнительных значений, можно указывать первым символом в одном параметре, к примеру -upload -compact -save сократить до -ucs
jmcc.command.help.help = выводит помощь по командам
jmcc.command.compile.<path>.help = компилирует файл/папку по пути <path> в json
jmcc.command.compile.<path>.param.upload.help = укажите для загрузки на сервер, предотвращает сохранение json на диск
jmcc.command.compile.<path>.param.out.help = укажите для изменения пути сохранения результата
jmcc.command.compile.<path>.param.compact.help = укажите для сжатия выдаваемого json
jmcc.command.compile.<path>.param.save.help = укажите, чтобы при указанном -upload, json сохранился на диск
jmcc.command.update.check.help = проверить на обновления, при check_updates=True в jmcc.properties, проверка на обновления происходит при каждом запуске
jmcc.command.update.data.help = обновить базу кода до последней версии
jmcc.command.update.jmcc.help = обновиться до последней версии jmcc
jmcc.command.update.assets.help = обновить ассеты до последней версии, ассеты предоставляют дополнительную информацию для расширения
jmcc.command.about.help = выводит информацию о программе
jmcc.command.about.message = &eJMCC v{2} &fremake by donzgold:\n Версия: p{0}, d{1}\n Существует для того, чтобы компилировать код из собственного языка &eJustCode&f в &ejson&f, который принимает майнкрафт сервер &ejustmc.io&f\n Помощь по командам можно посмотреть написав команду '&ehelp&f'\n Пример использования команд jmcc: '&epy jmcc.py help&f'\nСсылки:\n GITHUB: &9https://github.com/donzgold/JustMC_compilator/&f\n DISCORD: &9https://discord.gg/VdhZCRr5dR
jmcc.command.decompile.<path>.help = декомпилирует json по пути <path> в JustCode
jmcc.command.decompile.<path>.param.out.help = укажите для изменения пути сохранения результата
jmcc.command.properties.set.<key>.<value>.help = устанавливает <value> в ключ <key> в jmcc.properties
jmcc.command.properties.get.<key>.help = выводит значение по ключу <key> из jmcc.properties
jmcc.command.modules.start.message = &fМодули:
jmcc.command.modules.mid.message = &fМодуль &e{1} &fv&e{2}\n&f Идентификатор: &e{0}\n&f Автор: {3}\n&f Описание: {4}
jmcc.command.modules.help = выводит список загруженных модулей

